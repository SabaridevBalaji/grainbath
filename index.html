<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>grainbath</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    </head>
    <body>
        <div class="container">
            <h1>grainbath</h1>
            <input type="file" id="upload" multiple accept="image/*">

        <div class="controls">
            <div class="slider-group">
                <label for="grain">Grain Intensity</label>
                <input type="range" id="grain" min="0" max="100" value="0">

            </div>
            <div class="slider-group">
                <label for="slices">Carousel Slices</label>
                <input type="number" id="slices" min="1" max="10" value="1">

            </div>
            <button id="processBtn">Slice & Export</button>
            <button id="zipBtn" style="">DOWNLOAD ALL (ZIP)</button>
        </div>
        <div id="output"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
